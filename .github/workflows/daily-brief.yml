name: Daily Morning Brief

on:
  schedule:
    - cron: '0 7 * * *'   # Every day 07:00 UTC
  workflow_dispatch:

jobs:
  trigger-daily-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Call Morning Brief Endpoint
        run: |
          curl -X GET "https://chainpulse-backend-2xok.onrender.com/send-morning-email?secret=${{ secrets.UPDATE_SECRET }}"
