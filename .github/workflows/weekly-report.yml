name: Weekly Regime Report

on:
  schedule:
    - cron: '0 9 * * 0'   # Every Sunday 09:00 UTC
  workflow_dispatch:

jobs:
  trigger-weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Call Weekly Report Endpoint
        run: |
          curl -X GET https://chainpulse-backend-2xok.onrender.com/weekly-report
