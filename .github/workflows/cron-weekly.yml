name: Weekly — Discipline Summary

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Send Weekly Discipline
        run: |
          curl -sf "https://chainpulse-backend-2xok.onrender.com/send-weekly-discipline?secret=${{ secrets.UPDATE_SECRET }}" || echo "weekly-discipline failed"

      - name: Send What Changed
        run: |
          curl -sf "https://chainpulse-backend-2xok.onrender.com/send-what-changed?secret=${{ secrets.UPDATE_SECRET }}" || echo "what-changed failed"
